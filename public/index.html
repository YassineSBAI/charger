<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARGER</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            transition: background-color 0.5s ease; 
        }
        h1 {
            color: red;
            font-size: 5rem;
            margin-bottom: 20px;
        }
        /* The main 3afak button */
        #afakBtn {
            font-size: 2rem;
            padding: 15px 40px;
            cursor: pointer;
            background-color: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }
        #afakBtn:hover {
            background-color: #ddd;
        }
        /* The new smaller reset button */
        #resetBtn {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
        }
        #resetBtn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <h1>CHARGER</h1>
    <button id="afakBtn">3afak</button>
    
    <button id="resetBtn">Reset to Black</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const btn = document.getElementById('afakBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Tell server 3afak was clicked
        btn.addEventListener('click', () => {
            socket.emit('buttonClicked');
        });

        // Tell server Reset was clicked
        resetBtn.addEventListener('click', () => {
            socket.emit('resetClicked');
        });

        // Change the background to whatever color the server says
        socket.on('colorChange', (color) => {
            document.body.style.backgroundColor = color;
        });
    </script>
</body>
</html>
