<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARGER</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            transition: background-color 0.5s ease; /* Makes the color change smooth */
        }
        h1 {
            color: red;
            font-size: 5rem;
            margin-bottom: 20px;
        }
        button {
            font-size: 2rem;
            padding: 15px 40px;
            cursor: pointer;
            background-color: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }
        button:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <h1>CHARGER</h1>
    <button id="afakBtn">3afak</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const btn = document.getElementById('afakBtn');

        // When you click the button, tell the server
        btn.addEventListener('click', () => {
            socket.emit('buttonClicked');
        });

        // When the server says "colorChange", change the background
        socket.on('colorChange', (color) => {
            document.body.style.backgroundColor = color;
        });
    </script>
</body>
</html>
