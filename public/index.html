<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAC book ta3k</title>
    <style>
        body {
            background-color: black;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            transition: background-color 0.5s ease; 
        }

        /* NEW: The animation instructions for the glowing text */
        @keyframes pulseGlow {
            0% { transform: scale(1); text-shadow: 0 0 10px red; }
            50% { transform: scale(1.05); text-shadow: 0 0 40px red, 0 0 60px red; }
            100% { transform: scale(1); text-shadow: 0 0 10px red; }
        }

        h1 {
            color: red;
            font-size: 5rem;
            margin-bottom: 20px;
            /* NEW: Apply the glowing animation to the title */
            animation: pulseGlow 2s infinite ease-in-out;
        }

        #afakBtn {
            font-size: 2rem;
            padding: 15px 40px;
            cursor: pointer;
            background-color: white;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.1s ease, background-color 0.2s ease; /* Makes the squish smooth */
        }
        
        #afakBtn:hover {
            background-color: #ddd;
        }

        /* NEW: This makes the button "squish" when clicked */
        #afakBtn:active {
            transform: scale(0.90);
        }

        #resetBtn {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 5px;
            transition: background-color 0.2s ease;
        }

        #resetBtn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <h1>MacBook ta3k</h1>
    <button id="afakBtn">3afak</button>
    <button id="resetBtn">Reset to Black</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const btn = document.getElementById('afakBtn');
        const resetBtn = document.getElementById('resetBtn');

        btn.addEventListener('click', () => {
            socket.emit('buttonClicked');
        });

        resetBtn.addEventListener('click', () => {
            socket.emit('resetClicked');
        });

        socket.on('colorChange', (color) => {
            document.body.style.backgroundColor = color;
        });
    </script>
</body>
</html>
